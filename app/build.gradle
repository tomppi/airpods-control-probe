plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v24'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v24'
        minSdk 29
        targetSdk 35
        versionCode 24
        versionName '24.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

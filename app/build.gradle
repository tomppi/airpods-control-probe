plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v26'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v26'
        minSdk 29
        targetSdk 35
        versionCode 26
        versionName '26.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v27'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v27'
        minSdk 29
        targetSdk 35
        versionCode 27
        versionName '27.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v21'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v21'
        minSdk 29
        targetSdk 35
        versionCode 21
        versionName '21.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v28control'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v28control'
        minSdk 29
        targetSdk 35
        versionCode 28
        versionName '28.0-control'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

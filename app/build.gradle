plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v20'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v20'
        minSdk 29
        targetSdk 35
        versionCode 20
        versionName '20.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v22'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v22'
        minSdk 29
        targetSdk 35
        versionCode 22
        versionName '22.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

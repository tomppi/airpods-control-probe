plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v23'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v23'
        minSdk 29
        targetSdk 35
        versionCode 23
        versionName '23.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

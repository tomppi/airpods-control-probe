plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v25'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v25'
        minSdk 29
        targetSdk 35
        versionCode 25
        versionName '25.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

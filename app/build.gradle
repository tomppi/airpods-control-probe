plugins {
    id 'com.android.application'
}

android {
    namespace 'com.airpodsprobe.v19'
    compileSdk 35

    defaultConfig {
        applicationId 'com.airpodsprobe.v19'
        minSdk 29
        targetSdk 35
        versionCode 19
        versionName '19.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
